  <path d="M32 2 L62 14 V40 C62 57 49 70 32 74 C15 70 2 57 2 40 V14 Z" fill="none" stroke="#0b0d0e" stroke-width="2.5"/>
  <!-- „VP" alb, bold sans pentru lizibilitate la 16px -->
  <text x="32" y="44" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">VP</text>
  <!-- accent LED: bară roșie sub VP (echo .led-line / .slash-strip) cu glow alb -->
